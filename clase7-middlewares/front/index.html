<!DOCTYPE html>
<html lang="es">

<body>
    <h1>Bienvenidos</h1>
    <script>
        async function consultarAPI(){
            const respuesta = await fetch('https://69f0c174c1533dbedc9db307.mockapi.io/api/v1/producto')
            const productos = await respuesta.json();
            productos.map((producto) => {
                console.log(`/recursos/img/${producto.imagen}`)
            })
        }

        consultarAPI();
    </script>
